spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# 1. Database Connection (Update with your Workbench DB name)
spring.datasource.url=jdbc:mysql://localhost:3306/pantry_tracker_db
spring.datasource.username=root
spring.datasource.password=your_password_here

# 2. Hibernate Settings
# 'update' automatically creates/updates tables based on your @Entity classes
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect